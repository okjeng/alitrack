<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서비스 점검 중 — AliTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff7f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    .title {
      font-size: 20px;
      font-weight: 800;
      color: #111;
      margin-bottom: 12px;
    }
    .desc {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .time {
      display: inline-block;
      background: #FFF3F0;
      color: #FF5A1F;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 100px;
      margin-bottom: 24px;
    }
    .refresh {
      background: #FF5A1F;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .refresh:active { opacity: 0.85; }
    .logo {
      font-size: 13px;
      color: #aaa;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔧</div>
    <div class="title">서비스 점검 중입니다</div>
    <div class="desc">
      더 나은 서비스를 위해 잠시 점검 중입니다.<br />
      불편을 드려 죄송합니다.
    </div>
    <div class="time" id="eta">잠시 후 다시 이용하실 수 있습니다</div>
    <button class="refresh" onclick="location.href='https://alitrack.kr'">
      새로고침
    </button>
    <div class="logo">AliTrack — alitrack.kr</div>
  </div>
</body>
</html>
