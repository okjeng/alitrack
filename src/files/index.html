<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <!-- ── 뷰포트: 모바일 최적화 + iOS 노치 대응 ── -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- viewport-fit=cover → safe-area-inset 사용 가능 (아이폰 홈바 겹침 방지) -->

  <title>AliTrack — 알리 최저가 추적기</title>
  <meta name="description"
        content="알리익스프레스 실시간 핫딜 · 가격 추적 · 역대 최저가 알림 서비스" />

  <!-- ── PWA Manifest 연결 ── -->
  <link rel="manifest" href="/manifest.json" />

  <!-- ══════════════════════════════════════════════════ -->
  <!-- iOS PWA 전용 설정 (Safari는 manifest 일부 무시)    -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- iOS 홈 화면 추가 시 standalone(주소창 숨김) 모드 활성화 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable"       content="yes" />

  <!-- iOS 상태바 스타일 (검정 반투명 → 다크 모드와 어울림) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- iOS 홈 화면 앱 이름 -->
  <meta name="apple-mobile-web-app-title" content="AliTrack" />

  <!-- iOS 홈 화면 아이콘 (크기별로 모두 지정해야 깨지지 않음) -->
  <link rel="apple-touch-icon" href="/icons/icon-180x180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167x167.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />

  <!-- iOS 스플래시 스크린 (기기별) -->
  <!-- iPhone 14 Pro Max -->
  <link rel="apple-touch-startup-image"
        media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
        href="/splash/splash-1290x2796.png" />
  <!-- iPhone 14 / 13 / 12 -->
  <link rel="apple-touch-startup-image"
        media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
        href="/splash/splash-1170x2532.png" />
  <!-- iPhone SE 3세대 -->
  <link rel="apple-touch-startup-image"
        media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
        href="/splash/splash-750x1334.png" />

  <!-- ══════════════════════════════════════════════════ -->
  <!-- Android / 공통 PWA 설정                           -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- 테마 색상 (안드로이드 상단 상태바 색상) -->
  <meta name="theme-color" content="#FF5A1F" />
  <meta name="theme-color" content="#ffffff"
        media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1a2e"
        media="(prefers-color-scheme: dark)" />

  <!-- 파비콘 -->
  <link rel="icon"       type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="icon"       type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
  <link rel="shortcut icon" href="/favicon.ico" />

  <!-- ── SEO / OG 태그 ── -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://alitrack.kr" />
  <meta property="og:title"       content="AliTrack — 알리 최저가 추적기" />
  <meta property="og:description" content="역대 최저가 달성 알림 · 가격 변동 차트 · 실시간 핫딜" />
  <meta property="og:image"       content="https://alitrack.kr/og-image.png" />
  <meta name="twitter:card"       content="summary_large_image" />

  <!-- ── 전화번호 자동 링크 방지 ── -->
  <meta name="format-detection" content="telephone=no" />

  <!-- ── 한국어 폰트 프리로드 (선택) ── -->
  <!-- <link rel="preconnect" href="https://cdn.jsdelivr.net" /> -->

  <!-- ── 글로벌 safe-area CSS 변수 ── -->
  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }
    /* 오프라인 배너 (SW가 오프라인 감지 시 표시) */
    #offline-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #1a1a2e;
      color: #fff;
      text-align: center;
      font-size: 13px;
      padding: calc(var(--sat) + 8px) 16px 8px;
      z-index: 9999;
    }
    #offline-banner.show { display: block; }
  </style>
</head>
<body>

  <!-- 오프라인 안내 배너 -->
  <div id="offline-banner">
    📡 인터넷 연결이 끊겼습니다. 일부 기능이 제한될 수 있어요.
  </div>

  <!-- React 앱 마운트 포인트 -->
  <div id="root"></div>

  <!-- ── React 앱 번들 (Vite 빌드 후 자동 삽입) ── -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- ── Service Worker 등록 ── -->
  <script>
    // Service Worker 등록
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const reg = await navigator.serviceWorker.register("/sw.js", {
            scope: "/",
          });
          console.log("[PWA] Service Worker 등록 성공:", reg.scope);

          // 새 버전 감지 시 사용자에게 업데이트 안내
          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            newWorker?.addEventListener("statechange", () => {
              if (
                newWorker.state === "installed" &&
                navigator.serviceWorker.controller
              ) {
                // 기존 버전이 있고 새 버전이 설치됨 → 새로고침 유도
                if (confirm("✨ AliTrack이 업데이트되었습니다! 새로고침하시겠어요?")) {
                  window.location.reload();
                }
              }
            });
          });
        } catch (err) {
          console.warn("[PWA] Service Worker 등록 실패:", err);
        }
      });
    }

    // 오프라인 감지
    const offlineBanner = document.getElementById("offline-banner");

    window.addEventListener("offline", () => {
      offlineBanner?.classList.add("show");
    });
    window.addEventListener("online", () => {
      offlineBanner?.classList.remove("show");
    });

    // iOS PWA 홈 화면 설치 유도 (Safari에서만)
    // Android는 beforeinstallprompt 이벤트로 처리
    let deferredPrompt = null;
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();  // 기본 설치 배너 억제
      deferredPrompt = e;  // 나중에 직접 띄울 수 있게 저장
      // React 앱에서 이 이벤트를 감지해 커스텀 설치 배너 표시
      window.dispatchEvent(new CustomEvent("pwa-installable"));
    });

    // 설치 완료 감지
    window.addEventListener("appinstalled", () => {
      console.log("[PWA] 홈 화면에 설치 완료!");
      deferredPrompt = null;
    });

    // 전역에서 설치 프롬프트 실행 가능하도록 노출
    window.__pwa = {
      install: async () => {
        if (!deferredPrompt) return false;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        return outcome === "accepted";
      },
      isInstalled: () =>
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true,
    };
  </script>

</body>
</html>
